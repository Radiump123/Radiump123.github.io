<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Arena Shooter - Upgraded</title>
<style>
  body { margin: 0; background: #222; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
  #gameCanvas { display: block; width: 100%; height: 500px; cursor: crosshair; background: #000; border-radius: 8px; }
  #hud { position: absolute; top: 10px; left: 0; width: 100%; pointer-events: none; display: flex; justify-content: space-between; padding: 0 16px; box-sizing: border-box; }
  #hud span { color: #fff; font-size: 14px; font-weight: 500; background: rgba(0,0,0,0.45); padding: 4px 10px; border-radius: 6px; }
  #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; width: 20px; height: 20px; }
  #crosshair::before, #crosshair::after { content:''; position: absolute; background: rgba(255,255,255,0.9); border-radius: 2px; }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
  #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); border-radius: 8px; color: #fff; gap: 12px; z-index: 10; }
  #overlay h2 { margin: 0; font-size: 22px; font-weight: 500; }
  #overlay p { margin: 0; font-size: 14px; color: rgba(255,255,255,0.7); text-align: center; line-height: 1.6; }
  #overlay button { padding: 10px 28px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.12); color: #fff; font-size: 15px; cursor: pointer; transition: background 0.2s; }
  #overlay button:hover { background: rgba(255,255,255,0.22); }
  #hit { position: absolute; inset: 0; border-radius: 8px; pointer-events: none; border: 4px solid transparent; transition: border-color 0.1s; }
  #ammo { position: absolute; bottom: 16px; right: 16px; color: #fff; font-size: 16px; font-weight: 500; background: rgba(0,0,0,0.45); padding: 6px 14px; border-radius: 6px; pointer-events: none; }
  #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 18px; font-weight: 500; pointer-events: none; opacity: 0; transition: opacity 0.3s; background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 8px; white-space: nowrap; }
  #wrap { position: relative; user-select: none; width: 100%; max-width: 900px; margin: auto; overflow: hidden; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  #healthbar { position: absolute; bottom: 16px; left: 16px; pointer-events: none; }
  #healthbar-inner { height: 10px; background: #4ade80; border-radius: 4px; transition: width 0.2s, background 0.3s; }
  #healthbar-bg { width: 140px; height: 10px; background: rgba(255,255,255,0.15); border-radius: 4px; }
</style>
</head>
<body>

<div id="wrap">
  <canvas id="gameCanvas"></canvas>
  <div id="hud"><span id="score">Score: 0</span><span id="wave">Wave 1</span></div>
  <div id="crosshair"></div>
  <div id="hit"></div>
  <div id="ammo">∞</div>
  <div id="healthbar">
    <div style="font-size:11px;color:rgba(255,255,255,0.6);margin-bottom:3px;">HP</div>
    <div id="healthbar-bg"><div id="healthbar-inner" style="width:100%;"></div></div>
  </div>
  <div id="msg"></div>
  <div id="overlay">
    <h2>3D Arena Shooter</h2>
    <p>WASD — Move &nbsp;|&nbsp; Space — Jump &nbsp;|&nbsp; Mouse — Look &nbsp;|&nbsp; Click — Shoot<br>Survive the waves. Don't get tagged.</p>
    <button id="startBtn">Click to Play</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('gameCanvas');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const waveEl = document.getElementById('wave');
const hitEl = document.getElementById('hit');
const msgEl = document.getElementById('msg');
const hbInner = document.getElementById('healthbar-inner');
const startBtn = document.getElementById('startBtn');

let scene, camera, renderer, clock;
let enemies = [], bullets = [], particles = [], colliders = [];
let gunGroup;
let score = 0, wave = 1, hp = 100, maxHp = 100;
let keys = {}, mouseX = 0, mouseY = 0, yaw = 0, pitch = 0;
let running = false, gameOver = false, initialized = false;
let shootCooldown = 0, gunRecoil = 0;
let waveTimer = 0, enemiesPerWave = 5, spawnedThisWave = 0;

// Physics variables
let playerVelocityY = 0;
let isGrounded = true;

function showMsg(txt, dur = 1500) {
  msgEl.textContent = txt; 
  msgEl.style.opacity = 1;
  setTimeout(() => msgEl.style.opacity = 0, dur);
}

function createCollider(mesh) {
  mesh.updateMatrixWorld();
  const box = new THREE.Box3().setFromObject(mesh);
  colliders.push(box);
}

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  scene.fog = new THREE.Fog(0x1a1a2e, 20, 80);

  camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 200);
  camera.position.set(0, 1.6, 0);
  scene.add(camera); // Add camera to scene so child objects (gun) render

  // Create Visual Gun
  gunGroup = new THREE.Group();
  const barrelGeo = new THREE.BoxGeometry(0.1, 0.15, 0.6);
  const barrelMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
  const barrel = new THREE.Mesh(barrelGeo, barrelMat);
  barrel.position.set(0.35, -0.3, -0.5);
  gunGroup.add(barrel);
  
  const sightGeo = new THREE.BoxGeometry(0.02, 0.05, 0.05);
  const sightMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
  const sight = new THREE.Mesh(sightGeo, sightMat);
  sight.position.set(0.35, -0.21, -0.75);
  gunGroup.add(sight);
  
  camera.add(gunGroup);

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(canvas.clientWidth, canvas.clientHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  clock = new THREE.Clock();

  // Floor
  const floorGeo = new THREE.PlaneGeometry(80, 80, 20, 20);
  const floorMat = new THREE.MeshLambertMaterial({ color: 0x2d2d44 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  const grid = new THREE.GridHelper(80, 20, 0x444466, 0x333355);
  scene.add(grid);

  // Walls
  const wallMat = new THREE.MeshLambertMaterial({ color: 0x3a3a5c });
  const walls = [
    [80,8,1, 0,4,-40], [80,8,1, 0,4,40],
    [1,8,80, -40,4,0], [1,8,80, 40,4,0]
  ];
  walls.forEach(([w,h,d,x,y,z]) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), wallMat);
    m.position.set(x,y,z); 
    m.receiveShadow = true; m.castShadow = true;
    scene.add(m);
    createCollider(m); // Add to collisions
  });

  // Obstacles
  const obsMat = new THREE.MeshLambertMaterial({ color: 0x4a4a6e });
  [[8,3,2, -10,1.5,5],[8,3,2, 10,1.5,-5],[2,5,8, -15,2.5,-12],[2,5,8, 15,2.5,12],
   [5,2,5,-5,1,15],[5,2,5,5,1,-15]].forEach(([w,h,d,x,y,z]) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), obsMat);
    m.position.set(x,y,z); 
    m.castShadow = true; m.receiveShadow = true;
    scene.add(m);
    createCollider(m); // Add to collisions
  });

  // Lights
  scene.add(new THREE.AmbientLight(0x404060, 0.6));
  const dirLight = new THREE.DirectionalLight(0x8080ff, 0.8);
  dirLight.position.set(10, 20, 10);
  dirLight.castShadow = true;
  scene.add(dirLight);
  
  [[-15,3,15,0x6655ff],[ 15,3,-15,0xff5566],[0,3,0,0x55ffaa]].forEach(([x,y,z,c]) => {
    const pl = new THREE.PointLight(c, 1.2, 25);
    pl.position.set(x,y,z); 
    scene.add(pl);
  });

  document.addEventListener('keydown', e => keys[e.code] = true);
  document.addEventListener('keyup', e => keys[e.code] = false);
  canvas.addEventListener('mousedown', shoot);
  document.addEventListener('mousemove', onMouse);

  spawnWave();
  requestAnimationFrame(loop);
}

function onMouse(e) {
  if (!running || gameOver) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-1.2, Math.min(1.2, pitch));
}

function spawnEnemy() {
  const geo = typeof THREE.CapsuleGeometry !== 'undefined' 
    ? new THREE.CapsuleGeometry(0.4, 1, 4, 8) 
    : new THREE.BoxGeometry(0.8, 1.8, 0.8);
    
  const mat = new THREE.MeshLambertMaterial({ color: 0xff3355, emissive: 0x880022 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  
  const angle = Math.random() * Math.PI * 2;
  const r = 18 + Math.random() * 12;
  mesh.position.set(Math.cos(angle)*r, 1, Math.sin(angle)*r);

  const eyeGeo = new THREE.SphereGeometry(0.1, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
  [-0.2, 0.2].forEach(ox => {
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(ox, 0.6, -0.45);
    mesh.add(eye);
  });

  const hp = 1 + Math.floor(wave * 0.5);
  scene.add(mesh);
  enemies.push({ mesh, hp, maxHp: hp, speed: 4 + wave * 0.5 });
  spawnedThisWave++;
}

function spawnWave() {
  spawnedThisWave = 0;
  enemiesPerWave = 5 + (wave - 1) * 2;
  waveEl.textContent = `Wave ${wave}`;
  showMsg(`Wave ${wave}!`, 2000);
}

function shoot() {
  if (!running || gameOver || shootCooldown > 0) return;
  shootCooldown = 0.15;
  gunRecoil = 0.1; // Trigger recoil animation

  const dir = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation);
  const geo = new THREE.SphereGeometry(0.08, 6, 6);
  const mat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
  const mesh = new THREE.Mesh(geo, mat);
  
  // Start bullet slightly ahead of camera
  mesh.position.copy(camera.position).addScaledVector(dir, 1.0);

  const light = new THREE.PointLight(0x00ffcc, 2, 4);
  mesh.add(light);
  scene.add(mesh);
  bullets.push({ mesh, dir: dir.clone(), speed: 30, life: 2 });

  hitEl.style.borderColor = 'rgba(0,255,200,0.3)';
  setTimeout(() => hitEl.style.borderColor = 'transparent', 80);
}

function spawnParticles(pos, color = 0xff3355) {
  for (let i = 0; i < 8; i++) {
    const geo = new THREE.SphereGeometry(0.06, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    const vel = new THREE.Vector3((Math.random()-0.5)*5, (Math.random()*5)+2, (Math.random()-0.5)*5);
    scene.add(mesh);
    particles.push({ mesh, vel, life: 0.6 });
  }
}

// Function to check if player hits a wall
function checkPlayerCollision(pos) {
  const playerBox = new THREE.Box3();
  playerBox.min.set(pos.x - 0.4, pos.y - 1.5, pos.z - 0.4);
  playerBox.max.set(pos.x + 0.4, pos.y + 0.2, pos.z + 0.4);
  
  for(let box of colliders) {
    if (playerBox.intersectsBox(box)) return true;
  }
  return false;
}

function loop() {
  requestAnimationFrame(loop);
  if (!running) return;
  
  const dt = Math.min(clock.getDelta(), 0.05);
  if (gameOver) { 
      renderer.render(scene, camera); 
      return; 
  }

  shootCooldown = Math.max(0, shootCooldown - dt);
  waveTimer += dt;

  // Animate gun recoil
  gunRecoil = THREE.MathUtils.lerp(gunRecoil, 0, dt * 15);
  gunGroup.position.z = gunRecoil * 2;
  gunGroup.rotation.x = gunRecoil;

  if (spawnedThisWave < enemiesPerWave && waveTimer > 1.5) {
    spawnEnemy();
    waveTimer = 0;
  }

  if (spawnedThisWave >= enemiesPerWave && enemies.length === 0) {
    wave++;
    setTimeout(() => { spawnWave(); waveTimer = 0; }, 1500);
    spawnedThisWave = enemiesPerWave; 
  }

  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // PLAYER MOVEMENT & COLLISION
  const speed = 10 * dt;
  const fwd = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
  
  let moveDir = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp']) moveDir.add(fwd).multiplyScalar(-1);
  if (keys['KeyS'] || keys['ArrowDown']) moveDir.add(fwd);
  if (keys['KeyA'] || keys['ArrowLeft']) moveDir.add(right).multiplyScalar(-1);
  if (keys['KeyD'] || keys['ArrowRight']) moveDir.add(right);

  if (moveDir.lengthSq() > 0) moveDir.normalize().multiplyScalar(speed);

  // Sliding XZ Collision
  camera.position.x += moveDir.x;
  if (checkPlayerCollision(camera.position)) camera.position.x -= moveDir.x;

  camera.position.z += moveDir.z;
  if (checkPlayerCollision(camera.position)) camera.position.z -= moveDir.z;

  // Physics: Gravity & Jumping
  playerVelocityY -= 25 * dt; // Gravity
  camera.position.y += playerVelocityY * dt;
  
  if (camera.position.y <= 1.6) {
      camera.position.y = 1.6;
      playerVelocityY = 0;
      isGrounded = true;
  } else {
      isGrounded = false;
  }

  if (keys['Space'] && isGrounded) {
      playerVelocityY = 9; // Jump power
  }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.life -= dt;
    b.mesh.position.addScaledVector(b.dir, b.speed * dt);
    
    if (b.life <= 0 || Math.abs(b.mesh.position.x) > 42 || Math.abs(b.mesh.position.z) > 42) {
      scene.remove(b.mesh); 
      bullets.splice(i, 1); 
      continue;
    }
    
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      // Simple Sphere collision for bullets
      if (b.mesh.position.distanceTo(enemies[j].mesh.position) < 1.0) {
        enemies[j].hp--;
        
        // Push enemy slightly when hit
        enemies[j].mesh.position.addScaledVector(b.dir, 0.5);

        spawnParticles(b.mesh.position);
        scene.remove(b.mesh); 
        bullets.splice(i, 1);
        hit = true;
        
        if (enemies[j].hp <= 0) {
          scene.remove(enemies[j].mesh);
          spawnParticles(enemies[j].mesh.position, 0xffaa00);
          enemies.splice(j, 1);
          score += 10 * wave;
          scoreEl.textContent = `Score: ${score}`;
        }
        break;
      }
    }
    // Bullet hits wall
    if (!hit && checkPlayerCollision(b.mesh.position)) {
        spawnParticles(b.mesh.position, 0x00ffcc);
        scene.remove(b.mesh); 
        bullets.splice(i, 1); 
    }
  }

  // Enemies Behavior
  for(let i = 0; i < enemies.length; i++) {
    let en = enemies[i];

    // Move toward player
    const dir = new THREE.Vector3().subVectors(camera.position, en.mesh.position).normalize();
    dir.y = 0;
    en.mesh.position.addScaledVector(dir, en.speed * dt);
    en.mesh.lookAt(camera.position.x, en.mesh.position.y, camera.position.z);
    en.mesh.position.y = 1;

    // Enemy vs Player Collision
    let distToPlayer = en.mesh.position.distanceTo(camera.position);
    if (distToPlayer < 1.5) {
      // Deal damage
      hp -= 15 * dt;
      hitEl.style.borderColor = 'rgba(255,0,50,0.5)';
      setTimeout(() => hitEl.style.borderColor = 'transparent', 100);
      
      const pct = Math.max(0, (hp / maxHp) * 100);
      hbInner.style.width = pct + '%';
      hbInner.style.background = hp > 60 ? '#4ade80' : hp > 30 ? '#facc15' : '#f87171';
      
      // Push enemy back so they don't clip through the camera
      let pushBack = new THREE.Vector3().subVectors(en.mesh.position, camera.position).normalize().multiplyScalar(0.1);
      pushBack.y = 0;
      en.mesh.position.add(pushBack);

      if (hp <= 0 && !gameOver) {
        gameOver = true;
        document.exitPointerLock();
        overlay.style.display = 'flex';
        overlay.innerHTML = `<h2>Game Over</h2><p>Score: ${score} &nbsp;|&nbsp; Wave: ${wave}</p><button onclick="location.reload()">Play Again</button>`;
      }
    }

    // Enemy vs Enemy Separation (Stops them from merging into one blob)
    for(let j = i + 1; j < enemies.length; j++) {
       let other = enemies[j];
       let dist = en.mesh.position.distanceTo(other.mesh.position);
       if (dist < 1.2) {
           let push = new THREE.Vector3().subVectors(en.mesh.position, other.mesh.position).normalize().multiplyScalar(0.05);
           push.y = 0;
           en.mesh.position.add(push);
           other.mesh.position.sub(push);
       }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.vel.y -= 15 * dt; // Gravity for particles
    p.mesh.material.opacity = p.life / 0.6;
    p.mesh.material.transparent = true;
    if (p.life <= 0) { 
        scene.remove(p.mesh); 
        particles.splice(i, 1); 
    }
  }

  renderer.render(scene, camera);
}

startBtn.addEventListener('click', () => {
  canvas.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  if (document.pointerLockElement === canvas) {
    running = true;
    overlay.style.display = 'none';
    if (!initialized) {
      init();
      initialized = true;
    }
  } else {
    running = false;
    if (!gameOver) {
      overlay.style.display = 'flex';
      startBtn.textContent = "Resume";
    }
  }
});
</script>
</body>
</html>
