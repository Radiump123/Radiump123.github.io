<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocol: Tactical Facility</title>
<style>
  body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Consolas', monospace; overflow: hidden; color: white; }
  #wrap { position: relative; width: 1000px; height: 600px; border: 2px solid #222; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }

  /* HUD */
  #hud { position: absolute; inset: 0; pointer-events: none; padding: 20px; }
  .stat-card { background: rgba(0,0,0,0.85); padding: 10px; border: 1px solid #00ffcc; margin-bottom: 5px; display: inline-block; min-width: 120px; }
  
  #minimap { position: absolute; top: 20px; right: 20px; width: 150px; height: 150px; background: rgba(0,20,20,0.8); border: 2px solid #00ffcc; border-radius: 4px; overflow: hidden; }
  #radar-dot { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }

  #bottom-left { position: absolute; bottom: 20px; left: 20px; width: 250px; }
  .bar { width: 100%; height: 10px; background: #111; border: 1px solid #333; margin-top: 5px; }
  #hp-fill { width: 100%; height: 100%; background: #ff2255; transition: width 0.2s; }

  #bottom-right { position: absolute; bottom: 20px; right: 20px; text-align: right; }
  #ammo-txt { font-size: 32px; font-weight: bold; color: #00ffcc; }

  #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 16px; height: 16px; pointer-events: none; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ffcc; }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }

  #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
  button { padding: 15px 40px; background: #00ffcc; border: none; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
</style>
</head>
<body>

<div id="wrap">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div class="stat-card">SECTOR: <span id="waveTxt">1</span></div><br>
    <div class="stat-card">SCORE: <span id="scoreTxt">0</span></div>
    
    <div id="minimap"><div id="radar-dot"></div><div id="radar-entities"></div></div>

    <div id="bottom-left">
      <div style="font-size: 10px;">BIO-SYNC STATUS</div>
      <div class="bar"><div id="hp-fill"></div></div>
    </div>

    <div id="bottom-right">
      <div id="weapon-label">SIDEARM</div>
      <div id="ammo-txt"><span id="mag">12</span> / <span id="res">48</span></div>
    </div>
  </div>

  <div id="crosshair"></div>
  <div id="overlay"><button id="startBtn">SYNC INTERFACE</button></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/** CONFIG **/
const WEAPONS = [
  { name: "SIDEARM", mag: 12, res: 48, rate: 200, auto: false, spread: 0.01, id: 0 },
  { name: "SMG", mag: 30, res: 90, rate: 80, auto: true, spread: 0.04, id: 1 },
  { name: "STRIKER", mag: 6, res: 24, rate: 800, auto: false, spread: 0.15, id: 2 }
];

let scene, camera, renderer, clock, gunGroup;
let world = { walls: [], enemies: [], bullets: [], particles: [], loots: [], lights: [] };
let player = { hp: 100, velY: 0, grounded: true, wIdx: 0, ammo: [12, 30, 6], res: [48, 90, 24], lastRegen: 0 };
let keys = {}, running = false, yaw = 0, pitch = 0, isAds = false, isShooting = false, lastShot = 0;

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020202);
  scene.fog = new THREE.Fog(0x020202, 1, 40);

  camera = new THREE.PerspectiveCamera(75, 1000/600, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
  renderer.setSize(1000, 600);
  clock = new THREE.Clock();

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.1));
  addPointLight(0, 4, 0, 0x00ffcc, 1.5, 15);
  addPointLight(-15, 4, -15, 0xffaa00, 1.2, 12);
  addPointLight(15, 4, 15, 0x0088ff, 1.2, 12);

  // Map Construction
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshPhongMaterial({color: 0x111111}));
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // Outer Walls
  addBox(0, 2, -30, 60, 4, 1); addBox(0, 2, 30, 60, 4, 1);
  addBox(-30, 2, 0, 1, 4, 60); addBox(30, 2, 0, 1, 4, 60);
  // Rooms
  addBox(-15, 2, -10, 1, 4, 20); addBox(15, 2, 10, 1, 4, 20);
  addBox(0, 2, 5, 10, 4, 1);

  // Weapon Mesh
  gunGroup = new THREE.Group();
  const gun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.5), new THREE.MeshPhongMaterial({color: 0x222222}));
  gunGroup.add(gun);
  camera.add(gunGroup);
  scene.add(camera);

  // Controls
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'KeyR') reload();
    if(e.code === 'Digit1') switchWeapon(0);
    if(e.code === 'Digit2') switchWeapon(1);
    if(e.code === 'Digit3') switchWeapon(2);
  });
  document.addEventListener('keyup', e => keys[e.code] = false);
  document.addEventListener('mousedown', e => { 
    if(e.button === 0) isShooting = true; 
    if(e.button === 2) isAds = true; 
  });
  document.addEventListener('mouseup', e => { 
    if(e.button === 0) isShooting = false; 
    if(e.button === 2) isAds = false; 
  });
  document.addEventListener('mousemove', e => {
    if(!running) return;
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-1.5, Math.min(1.5, pitch));
  });

  requestAnimationFrame(loop);
}

function addPointLight(x,y,z,col,int,dist) {
  const l = new THREE.PointLight(col, int, dist);
  l.position.set(x,y,z);
  scene.add(l);
  world.lights.push(l);
}

function addBox(x,y,z,w,h,d) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshPhongMaterial({color:0x1a1a1a}));
  m.position.set(x,y,z);
  scene.add(m);
  world.walls.push(new THREE.Box3().setFromObject(m));
}

function checkCol(pos) {
  const pBox = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(0.6, 1.8, 0.6));
  for(let w of world.walls) if(pBox.intersectsBox(w)) return true;
  return false;
}

function spawnParticle(pos, color) {
  const p = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color}));
  p.position.copy(pos);
  const vel = new THREE.Vector3((Math.random()-0.5)*0.2, Math.random()*0.2, (Math.random()-0.5)*0.2);
  world.particles.push({ mesh: p, vel, life: 1.0 });
  scene.add(p);
}

function shoot() {
  const w = WEAPONS[player.wIdx];
  const now = Date.now();
  if(player.ammo[player.wIdx] <= 0 || now - lastShot < w.rate) return;
  
  lastShot = now;
  player.ammo[player.wIdx]--;
  player.lastRegen = now;
  updateUI();

  const ray = new THREE.Raycaster();
  const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  // Spread
  dir.x += (Math.random()-0.5) * w.spread;
  dir.y += (Math.random()-0.5) * w.spread;
  ray.set(camera.position, dir);

  const hits = ray.intersectObjects(scene.children);
  if(hits.length > 0) {
    const hit = hits[0];
    for(let i=world.enemies.length-1; i>=0; i--) {
      if(hit.object === world.enemies[i].mesh) {
        for(let k=0; k<5; k++) spawnParticle(hit.point, 0xff0000); // Blood
        scene.remove(world.enemies[i].mesh);
        world.enemies.splice(i, 1);
        if(Math.random() > 0.7) spawnLoot(hit.point);
        break;
      }
    }
  }
  gunGroup.position.z += 0.1;
  if(!w.auto) isShooting = false;
}

function spawnLoot(pos) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshPhongMaterial({color: 0xff3366}));
  m.position.set(pos.x, 0.3, pos.z);
  scene.add(m);
  world.loots.push(m);
}

function reload() {
  const w = WEAPONS[player.wIdx];
  let need = w.mag - player.ammo[player.wIdx];
  let take = Math.min(need, player.res[player.wIdx]);
  player.ammo[player.wIdx] += take;
  player.res[player.wIdx] -= take;
  updateUI();
}

function switchWeapon(i) {
  player.wIdx = i;
  document.getElementById('weapon-label').innerText = WEAPONS[i].name;
  updateUI();
}

function updateUI() {
  document.getElementById('mag').innerText = player.ammo[player.wIdx];
  document.getElementById('res').innerText = player.res[player.wIdx];
  document.getElementById('hp-fill').style.width = player.hp + "%";
}

function loop() {
  requestAnimationFrame(loop);
  if(!running) return;
  const dt = clock.getDelta();

  // Movement & Crouch/Jump
  const isCrouching = keys['KeyC'];
  const targetH = isCrouching ? 0.8 : 1.6;
  const speed = (isCrouching ? 3 : (keys['ShiftLeft'] ? 11 : 6)) * dt;
  
  camera.rotation.set(pitch, yaw, 0, 'YXZ');
  const move = new THREE.Vector3();
  if(keys['KeyW']) move.z -= 1; if(keys['KeyS']) move.z += 1;
  if(keys['KeyA']) move.x -= 1; if(keys['KeyD']) move.x += 1;
  move.applyAxisAngle(new THREE.Vector3(0,1,0), yaw).normalize().multiplyScalar(speed);

  if(!checkCol(camera.position.clone().add(new THREE.Vector3(move.x, 0, 0)))) camera.position.x += move.x;
  if(!checkCol(camera.position.clone().add(new THREE.Vector3(0, 0, move.z)))) camera.position.z += move.z;

  if(keys['Space'] && player.grounded) { player.velY = 8; player.grounded = false; }
  player.velY -= 22 * dt;
  camera.position.y += player.velY * dt;
  if(camera.position.y <= targetH) { camera.position.y = targetH; player.velY = 0; player.grounded = true; }

  // Combat
  if(isShooting) shoot();
  gunGroup.position.lerp(isAds ? new THREE.Vector3(0, -0.15, -0.2) : new THREE.Vector3(0.3, -0.3, -0.4), 0.15);
  camera.fov = THREE.MathUtils.lerp(camera.fov, isAds ? 45 : 75, 0.15);
  camera.updateProjectionMatrix();

  // Regen
  if(Date.now() - player.lastRegen > 3000) {
    player.hp = Math.min(100, player.hp + 5 * dt);
    updateUI();
  }

  // AI & Particles
  world.enemies.forEach((en, i) => {
    const dir = new THREE.Vector3().subVectors(camera.position, en.mesh.position);
    dir.y = 0; const dist = dir.length(); dir.normalize();
    en.mesh.position.addScaledVector(dir, 4 * dt);
    en.mesh.lookAt(camera.position.x, 0.8, camera.position.z);
    if(dist < 1.2) { player.hp -= 30 * dt; updateUI(); if(player.hp <= 0) location.reload(); }
  });

  if(world.enemies.length < 5) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.6, 0.6), new THREE.MeshPhongMaterial({color: 0xff4400}));
    const a = Math.random()*Math.PI*2;
    m.position.set(Math.cos(a)*25, 0.8, Math.sin(a)*25);
    scene.add(m); world.enemies.push({mesh: m});
  }

  for(let i=world.particles.length-1; i>=0; i--) {
    const p = world.particles[i]; p.life -= dt;
    p.mesh.position.add(p.vel);
    if(p.life <= 0) { scene.remove(p.mesh); world.particles.splice(i,1); }
  }

  // Radar
  const dot = document.getElementById('radar-dot');
  dot.style.left = (75 + camera.position.x * 2) + 'px';
  dot.style.top = (75 + camera.position.z * 2) + 'px';

  renderer.render(scene, camera);
}

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('gameCanvas').requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  running = !!document.pointerLockElement;
  document.getElementById('overlay').style.display = running ? 'none' : 'flex';
  if(!initialized) { init(); initialized = true; }
});
</script>
</body>
</html>
