<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Protocol: Arsenal Update</title>
<style>
  body { margin: 0; background: #050508; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
  #wrap { position: relative; width: 1000px; height: 600px; border: 2px solid #333; border-radius: 8px; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,1); }
  canvas { display: block; width: 100%; height: 100%; }

  #hud { position: absolute; inset: 0; pointer-events: none; padding: 25px; }
  .stat-group { background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 5px; border-left: 4px solid #00ffcc; margin-bottom: 8px; display: inline-block; font-weight: bold; }
  
  #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; pointer-events: none; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ffcc; }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }

  #bottom-right { position: absolute; bottom: 25px; right: 25px; text-align: right; }
  #ammo-display { font-size: 32px; font-weight: 800; text-shadow: 0 0 10px #00ffcc; }
  #weapon-name { font-size: 14px; letter-spacing: 2px; color: #00ffcc; margin-bottom: 5px; }
  
  #bottom-left { position: absolute; bottom: 25px; left: 25px; width: 250px; }
  .bar-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; margin-top: 5px; }
  #hp-fill { width: 100%; height: 100%; background: #ff3366; transition: width 0.3s; box-shadow: 0 0 10px #ff3366; }

  #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
  button { padding: 15px 40px; font-size: 18px; font-weight: bold; cursor: pointer; background: #00ffcc; border: none; border-radius: 5px; color: #000; transition: 0.2s; }

  #msg { position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; font-weight: 900; color: #ffcc00; opacity: 0; transition: 0.3s; pointer-events: none; }
  #unlock-msg { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); color: #00ffcc; font-weight: bold; opacity: 0; transition: 0.5s; }
</style>
</head>
<body>

<div id="wrap">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div class="stat-group"><span id="waveTxt">WAVE 1</span></div><br>
    <div class="stat-group"><span id="scoreTxt">SCORE: 0</span></div>
    
    <div id="bottom-left">
      <div style="font-size: 11px; font-weight: bold; letter-spacing: 1px;">VITAL SIGNS</div>
      <div class="bar-bg"><div id="hp-fill"></div></div>
    </div>

    <div id="bottom-right">
      <div id="weapon-name">SIDEARM</div>
      <div id="ammo-display"><span id="mag">12</span> / <span id="res">48</span></div>
      <div style="font-size: 10px; opacity: 0.6;">[1-3] SWAP | [V] MELEE | [R] RELOAD</div>
    </div>
  </div>

  <div id="crosshair"></div>
  <div id="msg">WAVE CLEARED</div>
  <div id="unlock-msg">NEW WEAPON UNLOCKED</div>

  <div id="overlay">
    <h1 style="font-size: 40px; color: #00ffcc;">ARENA PROTOCOL</h1>
    <p style="opacity: 0.7; margin-bottom: 25px;">[1,2,3] Change Guns | [V] Melee Strike | [C] Crouch<br>Survive to unlock better gear.</p>
    <button id="startBtn">INITIALIZE</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/** ENGINE CONFIG **/
const WEAPONS = [
  { id: 0, name: "SIDEARM", mag: 12, res: 48, maxRes: 96, cool: 0.2, unlock: 1, type: 'single' },
  { id: 1, name: "SMG", mag: 30, res: 90, maxRes: 180, cool: 0.08, unlock: 3, type: 'auto' },
  { id: 2, name: "SHOTGUN", mag: 6, res: 24, maxRes: 48, cool: 0.8, unlock: 5, type: 'spread' }
];

/** GLOBALS **/
let scene, camera, renderer, clock, gun, meleeMesh;
let player = { hp: 100, velY: 0, grounded: true, weaponIdx: 0, ammo: [12, 90, 24], reserve: [48, 90, 24] };
let world = { wave: 1, score: 0, spawned: 0, enemies: [], bullets: [], walls: [], loots: [] };
let keys = {}, running = false, initialized = false, waveTransition = false, meleeActive = 0;
let yaw = 0, pitch = 0;

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020205);
  scene.fog = new THREE.Fog(0x020205, 10, 60);

  camera = new THREE.PerspectiveCamera(75, 1000/600, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
  renderer.setSize(1000, 600);
  clock = new THREE.Clock();

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const light = new THREE.PointLight(0x00ffcc, 1, 100);
  light.position.set(0, 15, 0);
  scene.add(light);

  // Map
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({color: 0x0a0a0a}));
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);
  scene.add(new THREE.GridHelper(100, 40, 0x1a1a1a, 0x0f0f0f));

  addWall(0, 2, -25, 50, 4, 1); addWall(0, 2, 25, 50, 4, 1);
  addWall(-25, 2, 0, 1, 4, 50); addWall(25, 2, 0, 1, 4, 50);

  // Gun
  gun = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.15, 0.5), new THREE.MeshPhongMaterial({color: 0x111111}));
  gun.add(body);
  gun.position.set(0.3, -0.3, -0.5);
  camera.add(gun);

  // Melee Visual
  meleeMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.1), new THREE.MeshPhongMaterial({color: 0x00ffcc}));
  meleeMesh.position.set(0.4, -0.5, -0.4);
  meleeMesh.visible = false;
  camera.add(meleeMesh);

  scene.add(camera);

  // Events
  document.addEventListener('keydown', e => { 
    keys[e.code] = true; 
    if(e.code === 'KeyR') reload();
    if(e.code === 'KeyV') doMelee();
    if(e.code === 'Digit1') switchWeapon(0);
    if(e.code === 'Digit2') switchWeapon(1);
    if(e.code === 'Digit3') switchWeapon(2);
  });
  document.addEventListener('keyup', e => keys[e.code] = false);
  document.addEventListener('mousemove', e => {
    if(!running) return;
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-1.4, Math.min(1.4, pitch));
  });
  document.addEventListener('mousedown', e => { if(e.button === 0) shoot(); });
  document.addEventListener('contextmenu', e => e.preventDefault());

  requestAnimationFrame(loop);
}

function addWall(x,y,z,w,h,d) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshPhongMaterial({color: 0x151515}));
  m.position.set(x,y,z); scene.add(m);
  world.walls.push(new THREE.Box3().setFromObject(m));
}

function checkCol(pos, size = 0.5) {
  const box = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(size, 1.8, size));
  for(let w of world.walls) if(box.intersectsBox(w)) return true;
  return false;
}

function switchWeapon(idx) {
  if (world.wave < WEAPONS[idx].unlock) return;
  player.weaponIdx = idx;
  document.getElementById('weapon-name').innerText = WEAPONS[idx].name;
  updateAmmoUI();
}

function updateAmmoUI() {
  document.getElementById('mag').innerText = player.ammo[player.weaponIdx];
  document.getElementById('res').innerText = player.reserve[player.weaponIdx];
}

function reload() {
  const w = WEAPONS[player.weaponIdx];
  if (player.ammo[player.weaponIdx] === w.mag || player.reserve[player.weaponIdx] <= 0) return;
  
  let needed = w.mag - player.ammo[player.weaponIdx];
  let take = Math.min(needed, player.reserve[player.weaponIdx]);
  
  player.ammo[player.weaponIdx] += take;
  player.reserve[player.weaponIdx] -= take;
  updateAmmoUI();
}

function doMelee() {
  if (meleeActive > 0) return;
  meleeActive = 0.4;
  meleeMesh.visible = true;
  
  world.enemies.forEach((en, i) => {
    if (en.mesh.position.distanceTo(camera.position) < 2.5) {
      scene.remove(en.mesh);
      world.enemies.splice(i, 1);
      world.score += 150;
      document.getElementById('scoreTxt').innerText = `SCORE: ${world.score}`;
    }
  });
}

function shoot() {
  const w = WEAPONS[player.weaponIdx];
  if (player.ammo[player.weaponIdx] <= 0 || clock.getElapsedTime() < w.lastShot + w.cool) return;
  
  player.ammo[player.weaponIdx]--;
  w.lastShot = clock.getElapsedTime();
  updateAmmoUI();

  const count = w.type === 'spread' ? 5 : 1;
  for(let i=0; i<count; i++) {
    const b = new THREE.Mesh(new THREE.SphereGeometry(0.06), new THREE.MeshBasicMaterial({color: 0x00ffcc}));
    b.position.copy(camera.position);
    const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    if(w.type === 'spread') {
      dir.x += (Math.random()-0.5) * 0.2;
      dir.y += (Math.random()-0.5) * 0.2;
    }
    world.bullets.push({ mesh: b, dir, life: 1.0 });
    scene.add(b);
  }
  gun.position.z += 0.1;
}

function spawnLoot(pos) {
  const type = Math.random() > 0.4 ? 'ammo' : 'hp';
  const color = type === 'hp' ? 0xff3366 : 0x00ccff;
  const m = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.35), new THREE.MeshPhongMaterial({color}));
  m.position.set(pos.x, 0.4, pos.z);
  scene.add(m);
  world.loots.push({ mesh: m, type });
}

function loop() {
  requestAnimationFrame(loop);
  if(!running) return;
  const dt = Math.min(clock.getDelta(), 0.1);

  // Wave Logic Fixed
  const target = 3 + (world.wave * 2);
  if (!waveTransition && world.enemies.length === 0 && world.spawned >= target) {
    waveTransition = true;
    document.getElementById('msg').style.opacity = 1;
    setTimeout(() => {
      world.wave++;
      world.spawned = 0;
      waveTransition = false;
      document.getElementById('msg').style.opacity = 0;
      document.getElementById('waveTxt').innerText = `WAVE ${world.wave}`;
      // Check Unlocks
      WEAPONS.forEach(w => { if(w.unlock === world.wave) {
        document.getElementById('unlock-msg').innerText = `UNLOCKED: ${w.name}`;
        document.getElementById('unlock-msg').style.opacity = 1;
        setTimeout(()=> document.getElementById('unlock-msg').style.opacity = 0, 3000);
      }});
    }, 2000);
  }
  if (!waveTransition && world.spawned < target && world.enemies.length < 5) {
    world.spawned++;
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.8), new THREE.MeshPhongMaterial({color: 0xff4400}));
    const a = Math.random()*Math.PI*2;
    m.position.set(Math.cos(a)*22, 1, Math.sin(a)*22);
    scene.add(m);
    world.enemies.push({ mesh: m });
  }

  // Melee Animation
  if (meleeActive > 0) {
    meleeActive -= dt;
    meleeMesh.rotation.x += 10 * dt;
    if(meleeActive <= 0) { meleeMesh.visible = false; meleeMesh.rotation.x = 0; }
  }

  // Movement
  const speed = keys['ShiftLeft'] ? 12 : 7;
  camera.rotation.set(pitch, yaw, 0, 'YXZ');
  const move = new THREE.Vector3();
  if(keys['KeyW']) move.z -= 1; if(keys['KeyS']) move.z += 1;
  if(keys['KeyA']) move.x -= 1; if(keys['KeyD']) move.x += 1;
  move.applyAxisAngle(new THREE.Vector3(0,1,0), yaw).normalize().multiplyScalar(speed * dt);
  if(!checkCol(camera.position.clone().add(new THREE.Vector3(move.x, 0, 0)))) camera.position.x += move.x;
  if(!checkCol(camera.position.clone().add(new THREE.Vector3(0, 0, move.z)))) camera.position.z += move.z;

  // Bullets & Entities
  for(let i=world.bullets.length-1; i>=0; i--) {
    const b = world.bullets[i];
    b.mesh.position.addScaledVector(b.dir, 60 * dt);
    b.life -= dt;
    let hit = false;
    for(let j=world.enemies.length-1; j>=0; j--) {
      if(b.mesh.position.distanceTo(world.enemies[j].mesh.position) < 1.0) {
        if(Math.random() > 0.7) spawnLoot(world.enemies[j].mesh.position);
        scene.remove(world.enemies[j].mesh); world.enemies.splice(j, 1);
        world.score += 100; document.getElementById('scoreTxt').innerText = `SCORE: ${world.score}`;
        hit = true; break;
      }
    }
    if(hit || b.life <= 0 || checkCol(b.mesh.position, 0.1)) { scene.remove(b.mesh); world.bullets.splice(i, 1); }
  }

  world.enemies.forEach(en => {
    const toP = new THREE.Vector3().subVectors(camera.position, en.mesh.position); toP.y = 0;
    const dist = toP.length(); toP.normalize();
    en.mesh.position.addScaledVector(toP, 5 * dt);
    en.mesh.lookAt(camera.position.x, 1, camera.position.z);
    if(dist < 1.4) {
      player.hp -= 20 * dt;
      document.getElementById('hp-fill').style.width = player.hp + "%";
      if(player.hp <= 0) location.reload();
    }
  });

  world.loots.forEach((l, i) => {
    if(l.mesh.position.distanceTo(camera.position) < 1.8) {
      if(l.type === 'hp') player.hp = Math.min(100, player.hp + 20);
      else player.reserve.forEach((r,idx) => player.reserve[idx] = Math.min(WEAPONS[idx].maxRes, r + 20));
      updateAmmoUI();
      document.getElementById('hp-fill').style.width = player.hp + "%";
      scene.remove(l.mesh); world.loots.splice(i, 1);
    }
  });

  gun.position.z = THREE.MathUtils.lerp(gun.position.z, -0.5, 0.1);
  renderer.render(scene, camera);
}

// Start sequence
WEAPONS.forEach(w => w.lastShot = 0);
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('gameCanvas').requestPointerLock();
  if(!initialized) { init(); initialized = true; running = true; document.getElementById('overlay').style.display='none'; }
});
</script>
</body>
</html>
